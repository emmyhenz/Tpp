<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>TPP — Container Warfare</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <p>Loading map…</p>
  </div>

  <!-- Shown in portrait: ask the player to rotate to landscape -->
  <div id="rotate-overlay">
    <div class="rotate-icon">⟳📱</div>
    <p>Rotate your device to landscape</p>
    <button id="fs-btn">Tap to play fullscreen</button>
  </div>

  <canvas id="game"></canvas>

  <!-- Low-health red vignette -->
  <div id="lowhp"></div>

  <!-- Aiming crosshair -->
  <div id="crosshair">
    <span class="ch-dot"></span>
    <span class="ch-line top"></span>
    <span class="ch-line bottom"></span>
    <span class="ch-line left"></span>
    <span class="ch-line right"></span>
  </div>

  <!-- Health UI -->
  <div id="health">
    <div class="hp-row">
      <span class="hp-heart">❤</span>
      <div class="hp-track">
        <div class="hp-fill" id="hp-fill"></div>
        <div class="hp-fill-ghost" id="hp-ghost"></div>
      </div>
      <span class="hp-val" id="hp-val">100</span>
    </div>
  </div>

  <!-- Top HUD -->
  <div id="hud-top">
    <div class="team-bar">
      <span class="score blue">1</span>
      <span class="timer" id="timer">00:11</span>
      <span class="score orange">1</span>
    </div>
    <div class="objective">Objective: 5</div>
  </div>

  <!-- Movement joystick (left) -->
  <div id="move-zone" class="joystick-zone">
    <div class="joystick-base" id="move-base">
      <div class="joystick-knob" id="move-knob"></div>
    </div>
    <div class="joystick-label">MOVE</div>
  </div>
  <div class="look-hint">drag screen to look</div>

  <!-- Weapon slots (top-right) -->
  <div id="weapon-slots">
    <button class="wslot" id="slot-0" data-slot="0">
      <span class="wname">— empty —</span>
      <span class="wkey">1</span>
    </button>
    <button class="wslot" id="slot-1" data-slot="1">
      <span class="wname">— empty —</span>
      <span class="wkey">2</span>
    </button>
    <div class="melee-indicator" id="melee-ind">🗡 Katana</div>
  </div>

  <!-- Pickup prompt -->
  <button id="pickup-prompt" class="hidden">
    <span class="pk-icon">🔫</span>
    <span class="pk-text">Pick up <b id="pk-name">AK47</b></span>
  </button>

  <!-- Gloo Wall ability (3 charges) -->
  <button class="ability-btn" id="btn-shield">
    <span class="ab-name">GLOO</span>
    <span class="ab-charges" id="gloo-charges">
      <i class="charge"></i><i class="charge"></i><i class="charge"></i>
    </span>
    <span class="ab-recharge" id="gloo-recharge"></span>
  </button>

  <!-- Action buttons (right) -->
  <div id="actions">
    <button class="action-btn jump" id="btn-jump">JUMP</button>
    <button class="action-btn slide" id="btn-slide">SLIDE</button>
  </div>

  <!-- Fire / aim joystick (drag to aim, hold to fire) -->
  <div id="fire-zone" class="fire-joystick">
    <div class="fire-base" id="fire-base">
      <div class="fire-knob" id="fire-knob">FIRE</div>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
